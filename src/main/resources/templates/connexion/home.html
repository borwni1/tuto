<!doctype html>
<html lang="fr">

<head th:replace="~{_fragments/layout.html :: head('Bonjour')}"></head>

<body>
  <header th:replace="~{ _fragments/layout.html :: header }"></header>

  <!-- -->
  <!-- Contenu de la page -->
  <!-- -->
  <section class="container my-3">
    <div class="row">

      <!-- Colonne 1 -->
      <div class="col-12 col-sm-6 ps-lg-5 d-flex flex-column Xjustify-content-center">

        <!-- Titre en haut de la page -->
        <div class="alert text-center bg-secondary-subtle" th:text="${alert}" th:if="${alert}">Mot de passe errone</div>
        <h2 class="text-center">Login</h2>

        <!-- Espacement vertical -->
        <div class="py-2 py-lg-4"></div>

        <!-- Ajustement en largeur -->
        <div class="mx-auto" style="max-width: 30rem;">

          <!-- Formulaire de saisie -->
          <form class="mb-auto" th:action="@{/connect}" method="post">

            <!-- Identifiant -->
            <div class="row my-4">
              <div class="col-12 col-xl-5">
                <label for="username" class="form-label">Identifiant</label>
              </div>
              <div class="col">
                <input type="text" id="username" class="form-control" name="username" required autofocus
                  th:value="${username}"></input>
              </div>
            </div>

            <!-- Mot de passe -->
            <div class="row my-4">
              <div class="col-12 col-xl-5">
                <label for="password" class="col-form-label">Mot de passe</label>
              </div>
              <div class="col">
                <div class="input-group">
                  <input type="password" id="password" th:value="${password}" class="form-control" name="password"
                    required></input>
                  <button type="button" class="input-group-text btn-link" onclick="showHidehPassword()"
                    th:value="${password}">
                    <i id="eyeIcon" class="bi-eye"></i>
                  </button>
                </div>
              </div>
            </div>

            <!-- Boutons en bas du formulaire -->
            <div class="text-center mt-4 mt-xl-5 mb-5">
              <input type="submit" class="btn btn-primary" value="Se connecter">
            </div>

          </form> <!-- Fin Formulaire de saisie -->

        </div> <!-- Fin Ajustement en largeur -->

      </div> <!-- Fin Colonne 1 -->

      <!-- Colonne 2, photo -->
      <div class="col-12 col-sm-6 my-3 d-flex align-items-center justify-content-center">
        <img class="img-fluid" src="img/photos/photo02.jpg">
      </div> <!-- Fin Colonne 2 -->

    </div>
  </section> <!-- Fin Contenu de la page -->

  <footer th:replace="~{ _fragments/layout.html :: footer }"></footer>

  <script>
    function showHidehPassword() {
      var input = document.getElementById('password')
      var icon = document.getElementById('eyeIcon')
      if (input.type == 'password') {
        input.type = 'text'
        icon.classList.replace('bi-eye', "bi-eye-slash")
      } else {
        input.type = 'password'
        icon.classList.replace("bi-eye-slash", 'bi-eye')
      }
    }
  </script>

</body>

</html>
